<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Gestão de Projetos CDR Sul</title>
    <style>
        /* ===== RESET E BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            overflow-x: hidden;
        }

        /* ===== CONTAINER PRINCIPAL ===== */
        .main-container {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ===== TELA DE LOGIN ===== */
        .login-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .logo {
            width: 300px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .login-header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .login-header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .login-form-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
        }

        .login-form-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #4a5568;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #4a5568;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== SPINNER DE LOADING ===== */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== ALERTAS CENTRALIZADOS ===== */
        .alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .alert-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .alert-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .alert-overlay.show .alert-box {
            transform: scale(1);
        }

        .alert-box.success {
            border-left: 5px solid #38a169;
        }

        .alert-box.error {
            border-left: 5px solid #e53e3e;
        }

        .alert-box.info {
            border-left: 5px solid #3182ce;
        }

        .alert-icon {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .alert-icon.success {
            color: #38a169;
        }

        .alert-icon.error {
            color: #e53e3e;
        }

        .alert-icon.info {
            color: #3182ce;
        }

        .alert-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #2d3748;
        }

        .alert-message {
            color: #4a5568;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .alert-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .alert-button:hover {
            background: #5a67d8;
        }

        .register-link {
            text-align: center;
            margin-top: 15px;
            color: #4a5568;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        /* ===== DASHBOARD ===== */
        .dashboard {
            min-height: 100vh;
            background: #f7fafc;
            color: #2d3748;
            display: flex;
            flex-direction: column;
        }

        .dashboard-header {
            background: white;
            padding: 15px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo {
            width: 200px;
            height: auto;
            border-radius: 6px;
        }

        .user-info h2 {
            color: #2d3748;
            margin-bottom: 3px;
            font-size: 1.2rem;
        }

        .user-info p {
            color: #718096;
            margin: 0;
            font-size: 0.9rem;
        }

        .admin-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 8px;
        }

        .btn-logout {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.3s ease;
        }

        .btn-logout:hover {
            background: #c53030;
        }

        .dashboard-nav {
            background: white;
            padding: 0 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 0;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .nav-btn {
            background: none;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: 600;
            color: #718096;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            color: #4a5568;
            background: #f7fafc;
        }

        .nav-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .dashboard-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* ===== ABAS DO DASHBOARD ===== */
        .overview-tab h3,
        .reports-tab h3,
        .activities-tab h3,
        .files-tab h3,
        .admin-tab h3 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card h4 {
            color: #718096;
            margin-bottom: 12px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .project-info {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
        }

        .project-info h4 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .project-info p {
            margin-bottom: 8px;
            color: #4a5568;
            font-size: 0.9rem;
        }

        /* ===== SEÇÃO PDF ===== */
        .pdf-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            margin-top: 20px;
            text-align: center;
        }

        .pdf-section h4 {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .pdf-section p {
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .btn-pdf {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-pdf:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* ===== FORMULÁRIOS ===== */
        .reports-tab,
        .activities-tab,
        .files-tab,
        .finance-tab {
            background: white;
            max-width: 800px;
            margin: 0 auto;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
        }

        /* ===== VALIDAÇÃO DE ARQUIVOS ===== */
        .file-validation {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .file-validation.success {
            background: #f0fff4;
            border: 1px solid #9ae6b4;
            color: #276749;
        }

        .file-validation.error {
            background: #fed7d7;
            border: 1px solid #fc8181;
            color: #c53030;
        }

        .file-validation.info {
            background: #ebf8ff;
            border: 1px solid #90cdf4;
            color: #2b6cb0;
        }

        /* ===== PAINEL ADMIN ===== */
        .admin-tab {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .admin-sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .admin-section {
            background: #f7fafc;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        .admin-section h4 {
            color: #2d3748;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .admin-item {
            background: white;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-item:last-child {
            margin-bottom: 0;
        }

        .admin-item strong {
            color: #2d3748;
        }

        .admin-item small {
            color: #718096;
        }

        .btn-admin-pdf {
            background: #667eea;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-admin-pdf:hover {
            background: #5a67d8;
        }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 768px) {
            .login-header h1 {
                font-size: 1.7rem;
            }

            .login-form-container {
                padding: 25px 20px;
            }

            .dashboard-header {
                padding: 12px 15px;
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .header-left {
                flex-direction: column;
                gap: 8px;
            }

            .header-logo {
                width: 150px;
            }

            .dashboard-nav {
                padding: 0 15px;
            }

            .nav-btn {
                padding: 12px 15px;
            }

            .dashboard-content {
                padding: 15px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .admin-sections {
                grid-template-columns: 1fr;
            }

            .alert-box {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 15px;
            }

            .login-form-container {
                padding: 20px 15px;
            }

            .logo {
                width: 150px;
            }

            .header-logo {
                width: 120px;
            }

            .login-header h1 {
                font-size: 1.4rem;
            }

            .dashboard-content {
                padding: 12px;
            }

            .reports-tab,
            .activities-tab,
            .files-tab,
            .admin-tab {
                padding: 20px 15px;
            }
        }

        /* ===== MELHORIAS PARA IFRAME ===== */
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .dashboard {
            height: 100vh;
            overflow: hidden;
        }

        .dashboard-content {
            height: calc(100vh - 120px);
            overflow-y: auto;
        }

        /* ===== SCROLLBAR CUSTOMIZADA ===== */
        .dashboard-content::-webkit-scrollbar {
            width: 6px;
        }

        .dashboard-content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .dashboard-content::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        .dashboard-content::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* ===== ANIMAÇÕES ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-form-container,
        .dashboard-content > * {
            animation: fadeIn 0.4s ease-out;
        }

        /* ===== ESTADOS DE LOADING ===== */
        .loading {
            text-align: center;
            color: #718096;
            font-style: italic;
            font-size: 0.9rem;
        }

        /* ===== MELHORIAS VISUAIS ===== */
        .form-group input[type="file"] {
            padding: 6px;
            background: #f7fafc;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .dashboard-content .btn-primary {
            width: auto;
            display: inline-block;
            padding: 12px 24px;
        }

        .form-actions {
            text-align: center;
            margin-top: 15px;
        }

        .error-message {
            color: #e53e3e;
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .success-message {
            color: #38a169;
            font-size: 0.8rem;
            margin-top: 4px;
        }
        /* ===== ESTILOS DAS TABELAS FINANCEIRAS ===== */
        .finance-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .finance-section h3 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        
        .finance-table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        .finance-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .finance-table th,
        .finance-table td {
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            text-align: left;
        }

        .finance-table th {
            background: #f7fafc;
            font-weight: 600;
            color: #4a5568;
        }

        .finance-table td {
            color: #2d3748;
        }

        .finance-table tr:nth-child(even) {
            background: #fdfdfd;
        }

        .finance-table td a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .finance-table td a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- O conteúdo será carregado dinamicamente pelo JavaScript -->
    </div>

    <!-- Overlay de alertas centralizados -->
    <div class="alert-overlay" id="alertOverlay">
        <div class="alert-box" id="alertBox">
            <div class="alert-icon" id="alertIcon">ℹ️</div>
            <div class="alert-title" id="alertTitle">Informação</div>
            <div class="alert-message" id="alertMessage">Mensagem do sistema</div>
            <button class="alert-button" onclick="hideAlert()">OK</button>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÕES ====================
        const CONFIG = {
            GOOGLE_APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxTacaMknU6w2LOgLvjeMMxd_431FdlJbQB1XdcJd7xWvJ3JMq_rUz5egmPpvxxySYCjw/exec',
            VERSION: 'SISTEMA FINAL BASE64 v2.0',
            DEBUG: true,
            MAX_FILE_SIZE: 10 * 1024 * 1024, // 10MB em bytes
            MAX_TOTAL_SIZE: 50 * 1024 * 1024, // 50MB total
            SUPPORTED_FORMATS: ['pdf', 'doc', 'docx', 'jpg', 'jpeg', 'png', 'gif', 'txt', 'zip', 'rar', 'xlsx', 'ppt', 'xls']
        };

        // ==================== ESTADO GLOBAL ====================
        let currentUser = null;
        let isLoggedIn = false;

        // ==================== INICIALIZAÇÃO ====================
        document.addEventListener('DOMContentLoaded', function() {
            console.log(`[CDR Sul] Sistema CDR Sul iniciando - Versão ${CONFIG.VERSION}`);
            
            // Verificar sessão salva
            checkSavedSession();
            
            // Testar conectividade
            testConnectivity();
        });

        // ==================== SISTEMA DE ALERTAS CENTRALIZADOS ====================
        function showAlert(message, type = 'info', title = null) {
            const overlay = document.getElementById('alertOverlay');
            const box = document.getElementById('alertBox');
            const icon = document.getElementById('alertIcon');
            const titleEl = document.getElementById('alertTitle');
            const messageEl = document.getElementById('alertMessage');
            
            // Configurar tipo
            box.className = `alert-box ${type}`;
            icon.className = `alert-icon ${type}`;
            
            // Configurar ícones
            switch (type) {
                case 'success':
                    icon.textContent = '✅';
                    titleEl.textContent = title || 'Sucesso';
                    break;
                case 'error':
                    icon.textContent = '❌';
                    titleEl.textContent = title || 'Erro';
                    break;
                case 'info':
                default:
                    icon.textContent = 'ℹ️';
                    titleEl.textContent = title || 'Informação';
                    break;
            }
            
            messageEl.textContent = message;
            
            // Mostrar overlay
            overlay.classList.add('show');
            
            // Auto-hide após 8 segundos para sucesso
            if (type === 'success') {
                setTimeout(() => {
                    hideAlert();
                }, 8000);
            }
        }

        function hideAlert() {
            const overlay = document.getElementById('alertOverlay');
            overlay.classList.remove('show');
        }

        // ==================== VERIFICAR SESSÃO SALVA ====================
        function checkSavedSession() {
            try {
                const savedUser = localStorage.getItem('cdr_user');
                if (savedUser) {
                    currentUser = JSON.parse(savedUser);
                    console.log('👤 Usuário recuperado:', currentUser.email);
                    showDashboard(currentUser);
                    return;
                }
            } catch (e) {
                localStorage.removeItem('cdr_user');
            }
            
            showLoginScreen();
        }

        // ==================== TESTAR CONECTIVIDADE ====================
        async function testConnectivity() {
            console.log('🔍 Testando conectividade...');
            
            try {
                const response = await fetch(CONFIG.GOOGLE_APPS_SCRIPT_URL, {
                    method: 'GET',
                    mode: 'cors'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ Conectividade OK:', data.version);
                } else {
                    console.log('⚠️ Resposta não OK:', response.status);
                }
            } catch (error) {
                console.log('❌ Erro de conectividade:', error);
            }
        }

        // ==================== MOSTRAR TELA DE LOGIN ====================
        function showLoginScreen() {
            document.querySelector('.main-container').innerHTML = `
                <div class="login-container">
                    <div class="login-header">
                        <img src="https://static.wixstatic.com/media/96b2d1_82005fa5efee493fb11c905fa9b56a83~mv2.png" alt="CDR Sul Tocantins" class="logo">
                        <h1>Sistema de Gestão de Projetos CDR Sul</h1>
                        <p>Tudo sobre o seu projeto, reunido em um só lugar</p>
                    </div>
                    
                    <div class="login-form-container">
                        <h2>Acesso ao Sistema</h2>

        // ==================== PROCESSAR LOGIN ====================
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const btnText = btn.querySelector('.btn-text');
            
            console.log('🔐 Tentando login:', email);
            
            // Mostrar loading
            btn.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div> Fazendo login...';
            
            try {
                const result = await sendRequest({
                    action: 'login',
                    email: email,
                    password: password
                });
                
                if (result.success) {
                    console.log('✅ Login bem-sucedido:', result.user);
                    currentUser = result.user || result.data?.user;
                    isLoggedIn = true;
                    localStorage.setItem('cdr_user', JSON.stringify(currentUser));
                    
                    showAlert('Login realizado com sucesso!', 'success');
                    setTimeout(() => {
                        showDashboard(currentUser);
                    }, 1500);
                } else {
                    showAlert('Erro no login: ' + result.message, 'error');
                }
            } catch (error) {
                console.error('❌ Erro no login:', error);
                showAlert('Erro de conexão. Verifique sua internet e tente novamente.', 'error');
            } finally {
                // Restaurar botão
                btn.disabled = false;
                btnText.textContent = 'Entrar';
            }
        }

        // ==================== PROCESSAR CADASTRO ====================
        async function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const institution = document.getElementById('registerInstitution').value;
            const project = document.getElementById('registerProject').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const btn = document.getElementById('registerBtn');
            const btnText = btn.querySelector('.btn-text');
            
            if (password !== confirmPassword) {
                showAlert('As senhas não coincidem!', 'error');
                return;
            }
            
            console.log('📝 Tentando cadastro:', email);
            
            // Mostrar loading
            btn.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div> Criando conta...';
            
            try {
                const result = await sendRequest({
                    action: 'register',
                    name: name,
                    email: email,
                    institution: institution,
                    project: project,
                    password: password
                });
                
                if (result.success) {
                    showAlert('Usuário cadastrado com sucesso! Faça login para continuar.', 'success');
                    setTimeout(() => {
                        showLoginScreen();
                    }, 2000);
                } else {
                    showAlert('Erro no cadastro: ' + result.message, 'error');
                }
            } catch (error) {
                console.error('❌ Erro no cadastro:', error);
                showAlert('Erro de conexão. Verifique sua internet e tente novamente.', 'error');
            } finally {
                // Restaurar botão
                btn.disabled = false;
                btnText.textContent = 'Cadastrar';
            }
        }

        // ==================== VALIDAR ARQUIVOS ====================
        function validateFiles(input) {
            const files = input.files;
            const infoDiv = document.getElementById(input.id + 'Info');
            
            if (!files || files.length === 0) {
                infoDiv.style.display = 'none';
                return;
            }
            
            let totalSize = 0;
            let validFiles = [];
            let errors = [];
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const fileSizeMB = (file.size / 1024 / 1024).toFixed(2);
                
                // Verificar tamanho individual
                if (file.size > CONFIG.MAX_FILE_SIZE) {
                    errors.push(`${file.name}: ${fileSizeMB}MB (máximo: 10MB)`);
                    continue;
                }
                
                totalSize += file.size;
                validFiles.push({
                    name: file.name,
                    size: fileSizeMB,
                    type: file.type
                });
            }
            
            // Verificar tamanho total
            if (totalSize > CONFIG.MAX_TOTAL_SIZE) {
                const totalSizeMB = (totalSize / 1024 / 1024).toFixed(2);
                errors.push(`Tamanho total: ${totalSizeMB}MB (máximo: 50MB)`);
            }
            
            // Mostrar informações
            let html = '';
            let validationClass = 'info';
            
            if (validFiles.length > 0) {
                html += '<div style="margin-bottom: 10px;"><strong>✅ Arquivos Válidos:</strong></div>';
                validFiles.forEach(file => {
                    html += `<div>📁 ${file.name} (${file.size}MB)</div>`;
                });
                validationClass = 'success';
            }
            
            if (errors.length > 0) {
                html += '<div style="margin-top: 10px;"><strong>❌ Problemas Encontrados:</strong></div>';
                errors.forEach(error => {
                    html += `<div>⚠️ ${error}</div>`;
                });
                validationClass = 'error';
            }
            
            infoDiv.className = `file-validation ${validationClass}`;
            infoDiv.innerHTML = html;
            infoDiv.style.display = 'block';
        }

        // ==================== UPLOAD DE ARQUIVOS VIA BASE64 ====================
        async function uploadFilesBase64(data, files) {
            console.log('🚀 Iniciando upload Base64...');
            
            // Se não há arquivos, enviar apenas dados
            if (!files || files.length === 0) {
                return await sendRequest(data);
            }
            
            // Converter arquivos para Base64
            const filesBase64 = [];
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                
                // Verificar tamanho
                if (file.size > CONFIG.MAX_FILE_SIZE) {
                    throw new Error(`Arquivo ${file.name} é muito grande (${(file.size / 1024 / 1024).toFixed(2)}MB). Máximo: 10MB`);
                }
                
                console.log(`📁 Convertendo ${file.name} para Base64...`);
                
                const base64 = await convertFileToBase64(file);
                
                filesBase64.push({
                    name: file.name,
                    type: file.type,
                    size: file.size,
                    base64: base64
                });
                
                console.log(`✅ ${file.name} convertido (${base64.length} caracteres)`);
            }
            
            // Adicionar arquivos aos dados
            data.filesBase64 = JSON.stringify(filesBase64);
            
            console.log(`📤 Enviando ${filesBase64.length} arquivo(s) via Base64...`);
            
            return await sendRequest(data);
        }

        // ==================== CONVERTER ARQUIVO PARA BASE64 ====================
        function convertFileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                
                reader.onload = function() {
                    // Remover prefixo "data:tipo/mime;base64,"
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                
                reader.onerror = function() {
                    reject(new Error('Erro ao ler arquivo para conversão Base64'));
                };
                
                reader.readAsDataURL(file);
            });
        }

                console.error('❌ Erro ao carregar dados da Visão Geral:', error);
                // Definir como 0 em caso de erro para não mostrar "-"
                if (statsReports) statsReports.textContent = 0;
                if (statsActivities) statsActivities.textContent = 0;
                if (statsFiles) statsFiles.textContent = 0;
            }
        }

        // ==================== CARREGAR DADOS ADMINISTRATIVOS ====================
        async function loadAdminData() {
            if (!currentUser || !currentUser.isAdmin) return;
            
            try {
                const result = await sendRequest({
                    action: 'getAdminData'
                });
                
                if (result.success) {
                    const data = result.data;
                    
                    // Estatísticas
                    document.getElementById('adminStatsUsers').textContent = data.totalUsers || 0;
                    document.getElementById('adminStatsReports').textContent = data.totalReports || 0;
                    document.getElementById('adminStatsActivities').textContent = data.totalActivities || 0;
                    document.getElementById('adminStatsFiles').textContent = data.totalFiles || 0;
                    
                    // Usuários
                    const usersList = document.getElementById('adminUsersList');
                    if (data.users && data.users.length > 0) {
                        usersList.innerHTML = data.users.map(user => 
                            `<div class="admin-item">
                                <div>
                                    <strong>${user.name}</strong><br>
                                    ${user.email}<br>
                                    <small>${user.institution} - ${user.project}</small>
                                </div>
                                <button onclick="generateAdminPDF('${user.email}')" class="btn-admin-pdf">PDF</button>
                            </div>`
                        ).join('');
                    } else {
                        usersList.innerHTML = '<p>Nenhum usuário cadastrado</p>';
                    }
                    
                    // Relatórios
                    const reportsList = document.getElementById('adminReportsList');
                    if (data.recentReports && data.recentReports.length > 0) {
                        reportsList.innerHTML = data.recentReports.map(report => 
                            `<div class="admin-item">
                                <div>
                                    <strong>${report.title}</strong><br>
                                    ${report.userEmail}<br>
                                    <small>${new Date(report.date).toLocaleDateString()} - ${report.type}</small>
                                </div>
                            </div>`
                        ).join('');
                    } else {
                        reportsList.innerHTML = '<p>Nenhum relatório encontrado</p>';
                    }
                    
                    // Atividades
                    const activitiesList = document.getElementById('adminActivitiesList');
                    if (data.recentActivities && data.recentActivities.length > 0) {
                        activitiesList.innerHTML = data.recentActivities.map(activity => 
                            `<div class="admin-item">
                                <div>
                                    <strong>${activity.title}</strong><br>
                                    ${activity.userEmail}<br>
                                    <small>${new Date(activity.date).toLocaleDateString()} - ${activity.location || 'Local não informado'}</small>
                                </div>
                            </div>`
                        ).join('');
                    } else {
                        activitiesList.innerHTML = '<p>Nenhuma atividade encontrada</p>';
                    }
                    
                    // Arquivos
                    const filesList = document.getElementById('adminFilesList');
                    if (data.recentFiles && data.recentFiles.length > 0) {
                        filesList.innerHTML = data.recentFiles.map(file => 
                            `<div class="admin-item">
                                <div>
                                    <strong>${file.name}</strong><br>
                                    ${file.userEmail}<br>
                                    <small>${file.category} - ${file.size || 'Tamanho não informado'}</small>
                                </div>
                            </div>`
                        ).join('');
                    } else {
                        filesList.innerHTML = '<p>Nenhum arquivo encontrado</p>';
                    }
                    
                    console.log('✅ Dados administrativos carregados:', data);
                }
            } catch (error) {
                console.error('❌ Erro ao carregar dados administrativos:', error);
            }
        }

        // ==================== ENVIAR REQUISIÇÃO ====================
        async function sendRequest(data) {
            console.log('📡 Enviando requisição:', data);
            
            try {
                const response = await fetch(CONFIG.GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams(data)
                });
                
                if (!response.ok) {
                    throw new Error('HTTP error! status: ' + response.status);
                }
                
                const text = await response.text();
                const result = JSON.parse(text);
                console.log('📥 Resposta recebida:', result);
                return result;
                
            } catch (error) {
                console.error('❌ Erro na requisição:', error);
                throw error;
            }
        }

        // ==================== LOGOUT ====================
        function logout() {
            console.log('👋 Fazendo logout');
            currentUser = null;
            isLoggedIn = false;
            localStorage.removeItem('cdr_user');
            showLoginScreen();
        }

        console.log(`✅ Sistema CDR Sul - ${CONFIG.VERSION}`);
    </script>
</body>
</html>
